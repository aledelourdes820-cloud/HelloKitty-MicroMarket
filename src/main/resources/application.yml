# Perfil por defecto: dev (H2 en memoria, sin instalar MySQL).
# Para MySQL: --spring.profiles.active=prod  o variable SPRING_PROFILES_ACTIVE=prod

spring:
  application:
    name: hellokitty-micromarket
  profiles:
    active: dev

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: warn
